name: Deploy to Cloudflare Workers

# Deterministic deploy: on every push to main, build the Vite SPA and
# `wrangler deploy` it to the Worker named in wrangler.jsonc (petavue-ccpoc).
# Replaces Cloudflare's native Git integration (which kept opening config-sync
# branches). Only ONE of the two should be active — disconnect the native
# Workers Build in the Cloudflare dashboard once this is in place.

on:
  push:
    branches: [main]
    # Only deploy when something that affects the built app changes — skips
    # docs/memory-only commits so they don't burn runner minutes or queue time.
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.jsonc"
      - "vite.config.*"
      - "index.html"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # lets you trigger a deploy manually from the Actions tab (bypasses the paths filter)

# A newer push to main cancels an older deploy that's still queued/running, so
# rapid pushes don't stack up multiple jobs all competing for a hosted runner.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # fail fast instead of hanging indefinitely in the runner queue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Uses the locally-installed Wrangler v4 (devDependency) — required for the
      # assets-only SPA config in wrangler.jsonc. The action detects it and skips
      # its bundled (older) Wrangler.
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
